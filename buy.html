<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказать игру — Игро услуга</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #333; text-decoration: none; }
        .logo:hover { color: #007bff; }
        .main-content { max-width: 800px; margin: 40px auto; padding: 0 30px; }
        .order-card { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .order-card h1 { font-size: 28px; margin-bottom: 10px; }
        .order-card .subtitle { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 15px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px;
            font-size: 16px; font-family: Arial, sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #007bff; outline: none; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .portfolio-link { background: #e8f0fe; border-radius: 8px; padding: 12px 18px; margin: 10px 0 20px 0; border-left: 4px solid #007bff; }
        .portfolio-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .info-block { background: #e8f0fe; border-radius: 8px; padding: 15px 20px; margin: 25px 0; border-left: 4px solid #007bff; }
        .info-block strong { display: block; font-size: 16px; margin-bottom: 5px; }
        .info-block p { margin: 5px 0; color: #444; }
        .btn-submit { width: 100%; background: #007bff; color: white; font-size: 20px; font-weight: bold; padding: 16px; border: none; border-radius: 50px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #0056b3; }
        .btn-submit:disabled { background: #6c757d; cursor: not-allowed; }
        .back-link { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .status-message { padding: 15px 20px; border-radius: 8px; margin: 20px 0; display: none; font-weight: bold; }
        .status-message.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-message.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .footer { text-align: center; padding: 30px; color: #999; font-size: 14px; border-top: 1px solid #e0e0e0; margin-top: 40px; }

        /* CAPTCHA STYLES */
        .captcha-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .captcha-text {
            font-family: 'Courier New', monospace;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            background: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            border: 2px dashed #007bff;
            color: #007bff;
            user-select: none;
            min-width: 150px;
            text-align: center;
        }
        .captcha-input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            min-width: 150px;
        }
        .captcha-input:focus {
            border-color: #007bff;
            outline: none;
        }
        .captcha-refresh {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .captcha-refresh:hover {
            background: #5a6268;
        }
        .captcha-error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 600px) {
            .order-card { padding: 20px; }
            .captcha-container { flex-direction: column; align-items: stretch; gap: 10px; }
            .captcha-text { font-size: 24px; letter-spacing: 4px; }
            .captcha-refresh { align-self: flex-start; }
        }
    </style>
</head>
<body>

    <div id="header"></div>
    <script>
        fetch('header.html')
            .then(r => r.text())
            .then(data => document.getElementById('header').innerHTML = data)
            .catch(() => {
                document.getElementById('header').innerHTML = `
                    <header>
                        <div class="header-container">
                            <a href="/" class="logo">🎮 Игро услуга</a>
                            <nav>
                                <a href="/">Главная</a>
                                <a href="/descriptions/">Услуги</a>
                                <a href="/games/">Игры</a>
                                <a href="/reviews.html">Отзывы</a>
                            </nav>
                        </div>
                    </header>
                `;
            });
    </script>

    <main class="main-content">
        <div class="order-card">
            <h1>📩 Оформить заказ</h1>
            <p class="subtitle">Заполните форму, и я свяжусь с вами</p>

            <div id="statusMessage" class="status-message"></div>

            <form id="orderForm">
                <div class="form-group">
                    <label for="service">Услуга</label>
                    <select id="service" required>
                        <option value="Создам игру на Unreal Engine — 15 000 ₽">Создам игру на Unreal Engine — 15 000 ₽</option>
                        <option value="Создам консольную игру на C — 3 000 ₽">Создам консольную игру на C — 3 000 ₽</option>
                        <option value="Создам игру для PS1 на C — 20 000 ₽ (временно недоступно)">Создам игру для PS1 на C — 20 000 ₽ (временно недоступно)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="game_description">Описание игры</label>
                    <textarea id="game_description" placeholder="Опишите идею, жанр, механику..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="client_name">Ваше имя</label>
                    <input type="text" id="client_name" placeholder="Как к вам обращаться" required>
                </div>

                <div class="form-group">
                    <label for="client_phone">Ваш номер телефона</label>
                    <input type="tel" id="client_phone" placeholder="+7 999 123-45-67" required>
                </div>

                <div class="portfolio-link">
                    📁 <strong>Моё портфолио:</strong> <a href="https://savva-gd.itch.io/" target="_blank">savva-gd.itch.io</a>
                </div>

                <!-- CAPTCHA -->
                <div class="captcha-container">
                    <span class="captcha-text" id="captchaText">A7F2K</span>
                    <input type="text" class="captcha-input" id="captchaInput" placeholder="Введите код с картинки" maxlength="5" autocomplete="off" />
                    <button type="button" class="captcha-refresh" id="captchaRefresh">🔄 Обновить</button>
                </div>
                <div class="captcha-error" id="captchaError">❌ Неверный код. Попробуйте ещё раз.</div>

                <div class="info-block">
                    <strong>💬 Как мы работаем</strong>
                    <p>1. Вы оставляете заявку.</p>
                    <p>2. Я связываюсь с вами.</p>
                    <p>3. Обсуждаем оплату и сроки.</p>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">📩 Отправить заявку</button>
            </form>

            <a href="/" class="back-link">← На главную</a>
        </div>
    </main>

    <footer class="footer">
        © 2026 Игро услуга — Студия разработки игр на заказ
    </footer>

    <script>
        // ============================================================
        // 1. CAPTCHA
        // ============================================================

        const captchaText = document.getElementById('captchaText');
        const captchaInput = document.getElementById('captchaInput');
        const captchaRefresh = document.getElementById('captchaRefresh');
        const captchaError = document.getElementById('captchaError');

        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function refreshCaptcha() {
            captchaText.textContent = generateCaptcha();
            captchaInput.value = '';
            captchaError.style.display = 'none';
        }

        captchaRefresh.addEventListener('click', refreshCaptcha);

        // Генерируем капчу при загрузке
        refreshCaptcha();

        // ============================================================
        // 2. ОТПРАВКА ФОРМЫ
        // ============================================================

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNkXnUslHGuOl4pwvU2wdX7LX85EtiDZydEKvjyiw0JRfW0Dyw9-U_Ly7jvgkLb66c/exec';

        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('client_name').value.trim();
            const phone = document.getElementById('client_phone').value.trim();
            const description = document.getElementById('game_description').value.trim();
            const service = document.getElementById('service').value;
            const status = document.getElementById('statusMessage');
            const btn = document.getElementById('submitBtn');

            // Проверка капчи
            const userCaptcha = captchaInput.value.trim().toUpperCase();
            const realCaptcha = captchaText.textContent;
            if (userCaptcha !== realCaptcha) {
                captchaError.style.display = 'block';
                captchaInput.style.borderColor = '#dc3545';
                refreshCaptcha();
                return;
            }
            captchaError.style.display = 'none';
            captchaInput.style.borderColor = '#ddd';

            if (!name || !phone || !description) {
                status.className = 'status-message error';
                status.textContent = '❌ Заполните все поля!';
                status.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';
            status.className = 'status-message';
            status.textContent = '';
            status.style.display = 'none';

            try {
                const url = SCRIPT_URL + '?name=' + encodeURIComponent(name) + 
                           '&phone=' + encodeURIComponent(phone) + 
                           '&description=' + encodeURIComponent(description) +
                           '&service=' + encodeURIComponent(service);
                
                await fetch(url, { mode: 'no-cors' });
                
                status.className = 'status-message success';
                status.textContent = '✅ Заявка отправлена! Я свяжусь с вами.';
                document.getElementById('orderForm').reset();
                refreshCaptcha();
                
            } catch (error) {
                status.className = 'status-message error';
                status.textContent = '❌ Ошибка отправки. Попробуйте позже.';
            } finally {
                btn.disabled = false;
                btn.textContent = '📩 Отправить заявку';
                status.style.display = 'block';
            }
        });
    </script>

</body>
</html>
